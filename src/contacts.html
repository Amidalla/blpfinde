<!doctype html>
<html lang="ru">
<include src="layout/head.html"></include>
<body>
<include src="layout/header.html"></include>
<main class="inside-page contacts-page">
    <section class="page-header contacts-page">
        <div class="page-header__inner">
            <div class="container">
                <div class="breadcrumb">
                    <nav class="breadcrumb__inner">
                        <ul class="breadcrumb__list">
                            <li class="breadcrumb__item">
                                <a href="#" class="breadcrumb__link">Главная</a>
                            </li>
                            <li class="breadcrumb__item active">
                                <span>Контакты</span>
                            </li>
                        </ul>
                        <a href="#" class="back-link">
                            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="18" viewBox="0 0 10 18" fill="none">
                                <path d="M9 1L1 9L9 17" stroke="#717D89" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <span>Назад</span>
                        </a>
                    </nav>
                </div>
                <div class="main-title">
                    <h1>Контакты</h1>
                </div>
            </div>
        </div>
    </section>
    <section class="main-info fade-up">
        <div class="main-info__inner">
            <div class="container">
                <div class="bid fade-up">
                    <div class="bid__inner">
                        <div class="bid__form">
                            <h2>Связаться с нами</h2>
                            <p>Если у вас есть вопросы, пожалуйста, заполните эту контактную форму. Спасибо!</p>
                            <form id="man-form" class="main-form">
                                <fieldset>
                                    <label>
                                        <input type="text" name="name" placeholder="Имя*" required="">
                                    </label>
                                    <label>
                                        <input type="tel" name="tel" placeholder="Телефон*" data-phone-input="" required="">
                                    </label>
                                    <label>
                                        <input type="email" name="email" placeholder="E-mail*" data-phone-input="" required="">
                                    </label>
                                </fieldset>
                                <fieldset>
                                    <label>
                                        <textarea name="comment" placeholder="Ваше сообщение"></textarea>
                                    </label>
                                    <label class="checkbox-label">
                                        <input type="checkbox" name="checkbox" required="">
                                        <span>
                                           Согласен c условиями обработки <a href="#">персональных данных</a> и <a href="#">политикой конфиденциальности</a>
                                        </span>
                                    </label>
                                    <button class="submit-btn color-btn">
                                        Отправить заявку
                                    </button>
                                </fieldset>
                            </form>
                        </div>
                        <div class="bid__contacts">
                            <h4>Обращайтесь любым удобным для вас способом</h4>
                            <div class="bid__container">
                                <div class="bid__links">
                                    <a href="mailto:vakhin@yandex.ru" class="bid__item">
                                        <include src="assets/svg/mail.html"></include>
                                        <span>vakhin@yandex.ru</span>
                                    </a>
                                    <a href="tel:+79167801210">+7 916 780 12 10</a>
                                </div>
                                <div class="bid__info">
                                    <div class="bid__text">
                                        <p>Пишите в Telegram, вам поможет наш менеджер</p>
                                    </div>
                                    <a href="mailto:vakhin@yandex.ru" class="bid__item">
                                        <include src="assets/svg/tg.html"></include>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
<include src="layout/modals.html"></include>
<include src="layout/footer.html"></include>
</body>
</html>
